<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>

<body>
    <p>Hi, welcome to Registration page</p>
    <p>Today is {{ day_of_week }}</p>
    <p>Time is {{ current_time }}</p>

    <div class="centered">
        <form action="/submit" method="POST">
            <label for="name">Name</label>
            <input type="text" name="name" id="name" placeholder="Enter Your name">
            <br>
            <label for="password">Password</label>
            <input type="password" name="password" id="password" placeholder="Enter your password">
            <br>
            <input type="submit" value="Submit">
        </form>
        <a href="get_data"><button>View Data</button></a>
    </div>

    <h1>TO DO LIST</h1>

        <div>
            <form>
                <label>Item Name</label>
                <input type="text" name="itemName">

                <label>Item Description</label>
                <textarea name="itemDescription"></textarea>

                <label>Item ID</label>
                <input type="text" name="itemId">

                <label>Item UUID</label>
                <input type="text" name="itemUuid">

                <label>Item Hash</label>
                <input type="text" name="itemHash">

                <button type="submit">Submit</button>
            </form>
        </div>
</body>
<style>
    body {
        background-color: whitesmoke;
    }

    p {
        text-align: center;
        font-size: 30px;
        font-family: Arial, Helvetica, sans-serif;
        color: black;
    }

    .centered {
        margin: auto;
        width: 50%;
        border: 3px solid green;
        padding: 10px;
    }
</style>

</html>
